name: Build Windows EXE (GUI)

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE (GUI version)
        run: |
          pyinstaller --noconfirm OpCore-Simplify-GUI.spec

      - name: Build EXE (CLI version)
        run: |
          pyinstaller --onefile --console --name OpCore-Simplify-CLI OpCore-Simplify.py

      - name: List built files
        run: |
          dir dist

      - name: Upload GUI EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpCore-Simplify-GUI-exe
          path: dist/OpCore-Simplify-GUI.exe
          retention-days: 30

      - name: Upload CLI EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpCore-Simplify-CLI-exe
          path: dist/OpCore-Simplify-CLI.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/OpCore-Simplify-GUI.exe
            dist/OpCore-Simplify-CLI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
