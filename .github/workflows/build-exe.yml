name: Build Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name "OpCore-Simplify" OpCore-Simplify.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpCore-Simplify-exe
          path: dist/OpCore-Simplify.exe
          retention-days: 30

      - name: Upload EXE to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/OpCore-Simplify.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}